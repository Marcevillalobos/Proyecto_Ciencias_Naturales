<!DOCTYPE html>
<html>

<head>
<title>MRUA</title>
</head>

<body>

<h2>Calculadora MRUA</h2>

<p>Seleccione una opción:</p>

<select id="opcion">
<option value="1">Velocidad Final</option>
<option value="2">Distancia</option>
<option value="3">Tiempo</option>
<option value="4">Aceleración</option>
</select>

<br><br>

Velocidad inicial (v0): <input id="v0"><br><br>
Velocidad final (v): <input id="v"><br><br>
Aceleración (a): <input id="a"><br><br>
Tiempo (t): <input id="t"><br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

<script>

function calcular(){

let opcion = document.getElementById("opcion").value;

let v0 = Number(document.getElementById("v0").value);
let v = Number(document.getElementById("v").value);
let a = Number(document.getElementById("a").value);
let t = Number(document.getElementById("t").value);

let resultado = "";

if(opcion == 1){
    resultado = v0 + a * t;
    document.getElementById("resultado").innerText = "Velocidad final = " + resultado;
}

else if(opcion == 2){
    resultado = v0 * t + 0.5 * a * t * t;
    document.getElementById("resultado").innerText = "Distancia = " + resultado;
}

else if(opcion == 3){
    resultado = (v - v0) / a;
    document.getElementById("resultado").innerText = "Tiempo = " + resultado;
}

else if(opcion == 4){
    resultado = (v - v0) / t;
    document.getElementById("resultado").innerText = "Aceleración = " + resultado;
}

}

</script>

</body>
</html>
